name: 🚀 Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm install

      - name: 🛠️ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Expo CLI
        run: npm install -g expo-cli

      - name: 🔐 Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: 🏢 Build Release APK
        run: npx expo run:android --variant release
        env:
          JAVA_TOOL_OPTIONS: -Xmx4096m

      - name: 📍 Find APK
        id: apk
        run: |
          APK_PATH=$(find . -name "app-release.apk" -type f 2>/dev/null | head -1)
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          body: |
            ## 📱 TaskNexus Mobile ${{ github.ref_name }}
            
            **APK Size:** ${{ steps.apk_info.outputs.size }}
            
            ### What's New
            - 🎨 Beautiful UI with consistent design system
            - 📄 PDF Tools with compress to target size
            - 🖼️ Advanced image processing
            - ⚡ Performance optimizations
            - 🔧 20+ utility tools
            
            ### Installation
            ```
            1. Download the APK file below
            2. Enable "Unknown Sources" in Settings > Security
            3. Install and launch TaskNexus Mobile
            ```
            
            ### Requirements
            - Android 7.0 (API 24) or higher
            - ~100MB storage space
            - Internet for PDF/AI features
            
            ### Support
            - 🐛 [Report Issues](https://github.com/${{ github.repository }}/issues)
            - 💡 [Request Features](https://github.com/${{ github.repository }}/issues/new)
            - ⭐ [Star the repo!](https://github.com/${{ github.repository }})
            
            ---
            Made with ❤️ by Deepak
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Notify release
        run: |
          echo "::notice::🚀 Release ${{ github.ref_name }} published with APK!"
