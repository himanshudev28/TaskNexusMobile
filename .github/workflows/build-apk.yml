name: 📦 Build APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm install

      - name: 🛠️ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Expo CLI
        run: npm install -g expo-cli

      - name: 🔐 Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: 🏢 Build Release APK
        run: npx expo run:android --variant release
        env:
          JAVA_TOOL_OPTIONS: -Xmx4096m

      - name: 📍 Find APK file
        id: apk
        run: |
          APK_PATH=$(find . -name "app-release.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found at: $APK_PATH"

      - name: 📊 Get APK info
        id: apk_info
        run: |
          APK_PATH="${{ steps.apk.outputs.apk_path }}"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          APK_SIZE_BYTES=$(stat -f%z "$APK_PATH" 2>/dev/null || stat -c%s "$APK_PATH")
          echo "size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "size_bytes=$APK_SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "📦 APK Size: $APK_SIZE"

      - name: ⬆️ Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasknexus-mobile-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: 📝 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const apkSize = '${{ steps.apk_info.outputs.size }}';
            const comment = `
## 📦 APK Build Successful!

| Metric | Value |
|--------|-------|
| **Status** | ✅ Success |
| **Size** | ${apkSize} |
| **Branch** | \`${{ github.head_ref }}\` |
| **Commit** | [\`${{ github.event.pull_request.head.sha }}\`](${{ github.event.pull_request.head.repo.html_url }}/commit/${{ github.event.pull_request.head.sha }}) |

### 📥 Download
- Download the APK from the [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) section

### ✨ Features
- PDF Tools (Compress, Merge, Split)
- Image Tools (Resize, Compress, Convert)
- 20+ Utility Tools
- Smooth Animations & Haptic Feedback

---
*Built with ❤️ by TaskNexus Mobile*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: 🚀 Create Release (on main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          tag_name: v${{ github.run_number }}
          name: Release Build #${{ github.run_number }}
          body: |
            ## 🎉 TaskNexus Mobile - Release Build #${{ github.run_number }}
            
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            
            **Size:** ${{ steps.apk_info.outputs.size }}
            
            ### Features
            - ✅ PDF Tools (Merge, Compress, Split, Convert)
            - ✅ Image Tools (Resize, Compress, Convert, AI Enhance)
            - ✅ 20+ Utility Tools
            - ✅ Smooth Animations & Haptic Feedback
            - ✅ Professional UI/UX
            
            ### Installation
            1. Download the APK below
            2. Enable "Unknown Sources" in Android settings
            3. Install and enjoy! 🚀
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ❌ Build failed notification
        if: failure()
        run: |
          echo "::error::APK build failed. Check logs above."
          exit 1

      - name: ✅ Build success notification
        if: success()
        run: |
          echo "::notice::APK built successfully! Size: ${{ steps.apk_info.outputs.size }}"
